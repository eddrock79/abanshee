/* =====================================================================
   SLIDESHOW  — cycle the existing boards with a slow, ghostly crossfade.
   Each board keeps its own layout exactly as-is; only a blur-and-fade
   carries you between them.

     ?play=1                         rotate the default set
     ?play=1&boards=normal,cinema,prices   choose & order the boards
     ?play=1&boards=normal:18,cinema:20,prices:14   per-board dwell (seconds)
     ?play=1&secs=20                 same dwell for every board (overrides defaults)

   While running: press  P  to pause/resume; opening the control drawer (C)
   pauses automatically so you can set things up without it swapping.
   ===================================================================== */
const SHOW = (function(){
  const on = params.has("play") && params.get("play")!=="0";
  // each board token may carry its own dwell: "cinema:20"
  const perSecs = {};
  let seq = (params.get("boards")||"").split(",").map(s=>s.trim()).filter(Boolean)
    .map(tok=>{ const [k,s]=tok.split(":"); const n=parseFloat(s); if(!isNaN(n)&&n>0) perSecs[k.trim()]=n; return k.trim(); })
    .filter(k=> k in MODES);
  if(!seq.length) seq = ["normal","cinema","prices"];
  const u = parseFloat(params.get("secs"));
  const uniform = (!isNaN(u) && u>0) ? u : null;   // a global ?secs= wins over per-board
  const DEF = { fringe:22, normal:18, gigs:18, cinema:20, prices:14 };  // per-board defaults
  return { on, seq, idx:0, timer:null, paused:false, fx:parseInt(params.get("fx"))||1,
           secsFor:k=> uniform || perSecs[k] || DEF[k] || 16 };
})();
/* Two problems fixed vs the previous version:
   1. cancelFX() runs at the top of every applyFX call — it cancels any in-flight
      timers and wipes stale inline styles, so Random mode can never inherit
      half-finished state from the previous transition.
   2. Every transition fully obscures the screen BEFORE switching content —
      no more mid-transition cuts. Content only changes while the overlay
      is at full coverage / stage is at opacity 0. */

let fxTimers=[];
function cancelFX(){
  fxTimers.forEach(clearTimeout); fxTimers=[];
  const s=document.querySelector(".stage");
  if(s){ s.classList.remove("fx-flicker"); Object.assign(s.style,{transition:"",opacity:"",filter:"",transform:""}); }
  const o=document.getElementById("fxOverlay");
  if(o){ o.className=""; o.style.cssText=""; }
}
function rAF2(fn){requestAnimationFrame(()=>requestAnimationFrame(fn));}

const FX_DATA={
  1:{name:"Ghost Fade",   total:1900},  // slow blur+desaturate dissolve
  2:{name:"Static",       total:1400},  // dark TV-standby interference
  3:{name:"Fog",          total:1600},  // pale spectral mist fades in and out
  4:{name:"Soul Rise",    total:1900},  // content drifts up, new board enters from below
  5:{name:"Blood Drain",  total:1500},  // deep crimson wash
  6:{name:"Flicker",      total:1100},  // dying-candle stutter to darkness
  7:{name:"Veil Drop",    total:1800},  // dark curtain falls then rises
  8:{name:"Warp",         total:2000},  // heat-haze blur+skew
  9:{name:"Apparition",   total:1200},  // soft white bloom, not a hard flash
 10:{name:"Shadow Creep", total:2100},  // darkness closes in from the edges
};
function currentFX(){ return SHOW.fx===0?Math.ceil(Math.random()*10):SHOW.fx; }

function applyFX(n,modeKey){
  cancelFX();   // always reset stale state first
  const fx=FX_DATA[n]||FX_DATA[1];
  const st=document.querySelector(".stage");
  const ov=document.getElementById("fxOverlay");
  function sw(){state.mode=modeKey;state.lastKey="";syncModeButtons();populateSrcInputs();loadData();}
  function T(ms,fn){ const id=setTimeout(fn,ms); fxTimers.push(id); }
  // overlay helper: fade in, switch content once fully covered, wait 200ms for
  // new content to render, then fade out. All timeouts are tracked via T().
  function wrap(cls,coverMs,outMs,maxOp){
    Object.assign(ov.style,{opacity:"0",transition:"none"}); ov.className=cls;
    rAF2(()=>{ ov.style.transition=`opacity ${coverMs}ms ease`; ov.style.opacity=String(maxOp||1); });
    T(coverMs+40,()=>{ sw();                           // content switches while fully covered
      T(200,()=>{ ov.style.transition=`opacity ${outMs}ms ease`; ov.style.opacity="0";  // 200ms: let new content render
        T(outMs+80,()=>{ ov.className=""; ov.style.cssText=""; }); }); });
  }
  switch(n){
    case 1:  // Ghost Fade
      Object.assign(st.style,{transition:"opacity .8s ease,filter .8s ease",opacity:"0",filter:"blur(14px) saturate(.2)"});
      T(840,()=>{ sw(); Object.assign(st.style,{transition:"none",opacity:"0",filter:"blur(14px) saturate(.2)"}); rAF2(()=>{ Object.assign(st.style,{transition:"opacity .85s ease,filter .85s ease",opacity:"1",filter:""}); T(880,()=>Object.assign(st.style,{transition:"",opacity:"",filter:""})); }); });
      break;
    case 2:  // Static — dark TV-standby (not blinding)
      wrap("fx-static",380,500,.9); break;
    case 3:  // Fog — spectral mist
      wrap("fx-fog",500,600,1); break;
    case 4:  // Soul Rise
      Object.assign(st.style,{transition:"opacity .75s ease,transform .75s ease",opacity:"0",transform:"translateY(-40px)"});
      T(800,()=>{ sw(); Object.assign(st.style,{transition:"none",opacity:"0",transform:"translateY(40px)"}); rAF2(()=>{ Object.assign(st.style,{transition:"opacity .75s ease,transform .75s ease",opacity:"1",transform:"translateY(0)"}); T(800,()=>Object.assign(st.style,{transition:"",opacity:"",transform:""})); }); });
      break;
    case 5:  // Blood Drain
      wrap("fx-drain",560,560,.93); break;
    case 6:  // Flicker — stutter to darkness, snap on
      st.classList.add("fx-flicker");
      T(870,()=>{ Object.assign(st.style,{transition:"none",opacity:"0"}); st.classList.remove("fx-flicker"); sw(); rAF2(()=>{ Object.assign(st.style,{transition:"opacity .22s ease",opacity:"1"}); T(240,()=>Object.assign(st.style,{transition:"",opacity:""})); }); });
      break;
    case 7:  // Veil Drop
      Object.assign(ov.style,{opacity:"1",transform:"scaleY(0)",transformOrigin:"top center",transition:"none"}); ov.className="fx-veil";
      rAF2(()=>{ ov.style.transition="transform .72s cubic-bezier(.35,0,.65,1)"; ov.style.transform="scaleY(1)"; });
      T(760,()=>{ sw(); T(220,()=>{ ov.style.transition="transform .72s cubic-bezier(.35,0,.65,1)"; ov.style.transform="scaleY(0)"; T(760,()=>{ ov.className=""; ov.style.cssText=""; }); }); });
      break;
    case 8:  // Warp
      Object.assign(st.style,{transition:"opacity .85s ease,filter .85s ease,transform .85s ease",opacity:"0",filter:"blur(10px)",transform:"scale(1.03) skewX(1.8deg)"});
      T(900,()=>{ sw(); Object.assign(st.style,{transition:"none",opacity:"0",filter:"blur(10px)",transform:"scale(1.03) skewX(-1.8deg)"}); rAF2(()=>{ Object.assign(st.style,{transition:"opacity .85s ease,filter .85s ease,transform .85s ease",opacity:"1",filter:"",transform:""}); T(900,()=>Object.assign(st.style,{transition:"",opacity:"",filter:"",transform:""})); }); });
      break;
    case 9:  // Apparition — soft bloom (not a hard flash)
      wrap("fx-blink",220,500,.78); break;
    case 10: // Shadow Creep
      wrap("fx-creep",880,700,1); break;
    default:
      Object.assign(st.style,{transition:"opacity .8s ease,filter .8s ease",opacity:"0",filter:"blur(14px) saturate(.2)"});
      T(840,()=>{ sw(); rAF2(()=>{ Object.assign(st.style,{transition:"opacity .85s ease,filter .85s ease",opacity:"1",filter:""}); T(880,()=>Object.assign(st.style,{transition:"",opacity:"",filter:""})); }); });
  }
  return fx.total;
}
function slideshowStep(){
  if(SHOW.paused || drawer.classList.contains("open")){ SHOW.timer=setTimeout(slideshowStep, 2000); return; }
  SHOW.idx=(SHOW.idx+1)%SHOW.seq.length;
  const k=SHOW.seq[SHOW.idx];
  const totalMs=applyFX(currentFX(), k);
  SHOW.timer=setTimeout(slideshowStep, SHOW.secsFor(k)*1000 + totalMs);
}
function startSlideshow(){
  if(!SHOW.on) return;
  SHOW.idx=0;
  SHOW.timer=setTimeout(slideshowStep, SHOW.secsFor(SHOW.seq[0])*1000);
}
document.addEventListener("keydown", e=>{
  if(SHOW.on && (e.key==="p"||e.key==="P") && document.activeElement.tagName!=="INPUT") SHOW.paused=!SHOW.paused;
});
